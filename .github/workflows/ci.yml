name: ci

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: ETL (données réelles CépiDc + INSEE)
        run: |
          python -m etl.download
          python -m etl.transform
          python -m etl.data_quality

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Dépendances R
        run: Rscript analysis/install.R
      - name: Standardisation et figure (R)
        run: |
          Rscript analysis/standardisation.R
          Rscript analysis/figures.R

      - name: Compilation de la note (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: report
          root_file: note.tex

      - uses: actions/upload-artifact@v4
        with:
          name: note-mortalite-territoriale
          path: report/note.pdf
